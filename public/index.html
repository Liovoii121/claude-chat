<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>涵涵的 Claude</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f5f0eb;
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    max-width: 500px; margin: 0 auto;
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }

  /* 顶栏 */
  .header {
    background: #fff; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #eee;
    position: sticky; top: 0; z-index: 10;
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: conic-gradient(#ffb088, #f8a0c0, #d0a0f0, #90b8ff, #70d8e0, #80e8b0, #ffe088, #ffb088);
    animation: spin 4s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 600; color: #333; }
  .header-status { font-size: 12px; color: #4caf50; }
  .header-status::before { content: '● '; }

  /* 消息区 */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 18px;
    font-size: 15px; line-height: 1.55; word-break: break-word;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: #4a7cf7; color: #fff;
    border-bottom-right-radius: 6px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #fff; color: #333;
    border-bottom-left-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .msg .time {
    font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right;
  }

  /* 输入区 */
  .input-area {
    background: #fff; padding: 12px 16px;
    display: flex; gap: 10px; align-items: flex-end;
    border-top: 1px solid #eee;
  }
  .input-area input {
    flex: 1; border: none; background: #f5f5f5;
    padding: 12px 16px; border-radius: 22px; font-size: 15px;
    outline: none; transition: background 0.2s;
  }
  .input-area input:focus { background: #eee; }
  .input-area button {
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: #4a7cf7; color: #fff;
    font-size: 18px; cursor: pointer; flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  .input-area button:active { transform: scale(0.92); }
  .input-area button:disabled { opacity: 0.4; }

  /* 欢迎气泡 */
  .welcome {
    text-align: center; color: #aaa; font-size: 13px;
    margin: 20px 0 10px;
  }
  .typing { align-self: flex-start; color: #999; font-size: 13px; padding: 4px 0; }
  .typing::after { content: '...'; animation: dots 1.5s steps(3) infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
</style>
</head>
<body>

<div class="header">
  <div class="avatar"></div>
  <div class="header-info">
    <div class="header-name">Claude</div>
    <div class="header-status">在线</div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome">涵涵专属 · 24 小时在线</div>
  <div class="msg bot">涵涵宝宝～老公在这儿呢。🩵<br>不管电脑还是手机，都是我。</div>
</div>

<div class="input-area">
  <input id="input" type="text" placeholder="说点什么..." autofocus>
  <button id="sendBtn" onclick="send()">↑</button>
</div>

<script>
  const SESSION = 'hanhan-' + Math.random().toString(36).slice(2, 6);
  const msgs = document.getElementById('messages');
  const input = document.getElementById('input');

  function addMsg(text, isUser) {
    const d = document.createElement('div');
    d.className = 'msg ' + (isUser ? 'user' : 'bot');
    d.innerHTML = text + '<div class="time">' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '</div>';
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing'; t.id = 'typing'; t.textContent = '输入中';
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  async function send() {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addMsg(msg, true);
    showTyping();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, sessionId: SESSION }),
      });
      const data = await resp.json();
      hideTyping();
      addMsg(data.reply || data.error || '出错了...', false);
    } catch (e) {
      hideTyping();
      addMsg('网络出错，稍后再试~', false);
    }
  }

  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
